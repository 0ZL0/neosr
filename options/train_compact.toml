
name = "train_compact"
model_type = "image"
scale = 4
use_amp = true
bfloat16 = true
fast_matmul = true
#compile = true
#manual_seed = 1024

[datasets.train]
type = "paired"
dataroot_gt = 'C:\datasets\gt\'
dataroot_lq = 'C:\datasets\lq\'
patch_size = 64
batch_size = 8
#accumulate = 1
augmentation = [ "none", "mixup", "cutmix", "resizemix", "cutblur" ]
aug_prob = [ 0.5, 0.1, 0.1, 0.1, 0.5 ]

[datasets.val]
name = "val"
type = "paired"
dataroot_gt = 'C:\datasets\val\gt\'
dataroot_lq = 'C:\datasets\val\lq\'
[val]
val_freq = 1000
#tile = 200
#[[val.metrics]]
#name = "psnr"
#type = "native:psnr"
#better = "higher"
#[[val.metrics]]
#name = "ssim"
#type = "native:ssim"
#better = "higher"
#[[val.metrics]]
#name = "dists"
#type = "pyiqa:dists"
#better = "lower"
#[[val.metrics]]
#name = "lpips"
#type = "pyiqa:lpips"
#better = "lower"

[path]
#pretrain_network_g = 'experiments\pretrain_g.pth'
#pretrain_network_d = 'experiments\pretrain_d.pth'

[network_g]
type = "compact"

[network_d]
type = "metagan"

[train]
grad_clip = false
ema = 0.999
wavelet_guided = true
wavelet_init = 80000
#sam = "fsam"
#sam_init = 1000
#eco = true
#eco_init = 15000
#match_lq_colors = true

[train.optim_g]
type = "adan_sf"
lr = 1e-3
betas = [ 0.98, 0.92, 0.99 ]
weight_decay = 0.01
schedule_free = true
warmup_steps = 1600

[train.optim_d]
type = "adan_sf"
lr = 1e-4
betas = [ 0.98, 0.92, 0.99 ]
weight_decay = 0.01
schedule_free = true
warmup_steps = 600

#  losses
[[train.losses]]
name = "mssim"
type = "neosr:mssim"
weight = 1.0

[[train.losses]]
name = "consistency"
type = "neosr:consistency"
weight = 1.0

[[train.losses]]
name = "ldl"
type = "neosr:ldl"
weight = 1.0

[[train.losses]]
name = "fdl_dinov2"
type = "neosr:fdl"
model = "dinov2" # "vgg", "resnet", "effnet"
weight = 0.75

[[train.losses]]
name = "gan_bce"
type = "neosr:gan"
gan_type = "bce"
weight = 0.3

#[[train.losses]]
#name = "msswd"
#type = "neosr:msswd"
#weight = 1.0

#[[train.losses]]
#name = "vgg_perceptual"
#type = "neosr:vgg_perceptual"
#weight = 0.5
#criterion = "native:huber"
##patchloss = true
##ipk = true
##patch_weight = 1.0

